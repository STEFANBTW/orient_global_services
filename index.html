
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orient Global</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f29e0d",
                        "primary-dark": "#c27d08",
                        "background-dark": "#0a0805",
                        "noir-black": "#050402",
                        "primary-blue": "#135bec",
                        "tournament-yellow": "#fac015",
                        "neon-purple": "#b026ff",
                        "cyber-cyan": "#00f3ff",
                        "void-black": "#020202",
                        "aero-white": "#f5f7fa",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "serif": ["Playfair Display", "serif"],
                        "heading": ["Montserrat", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
      @layer utilities {
        .glass-panel {
          background: rgba(10, 8, 5, 0.7);
          backdrop-filter: blur(12px);
          border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .animate-scroll {
          animation: scroll-left 20s linear infinite;
        }
        @keyframes scroll-left {
          0% { transform: translateX(0); }
          100% { transform: translateX(-50%); }
        }
        .wave-bar {
          animation: waveform 1s ease-in-out infinite;
        }
        @keyframes waveform {
          0%, 100% { height: 10%; }
          50% { height: 100%; }
        }
        .stroke-text {
          -webkit-text-stroke: 1px rgba(255,255,255,0.2);
        }
        .bg-scanlines {
          background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.5) 51%, rgba(0, 0, 0, 0.5) 100%);
          background-size: 100% 4px;
        }
        .bg-grid-pattern {
          background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
          background-size: 20px 20px;
        }
        .bg-grid-pattern-light {
          background-image: radial-gradient(rgba(0, 0, 0, 0.1) 1px, transparent 1px);
          background-size: 20px 20px;
        }
        .bg-cyber-grid {
          background-image: linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
          background-size: 20px 20px;
        }
        .animate-scanline {
          animation: scanline 8s linear infinite;
        }
        @keyframes scanline {
          0% { transform: translateY(-100%); }
          100% { transform: translateY(100%); }
        }
        .animate-float {
          animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-20px); }
        }
        .animate-float-delayed {
          animation: float 6s ease-in-out infinite;
          animation-delay: 2s;
        }
        .animate-pulse-slow {
          animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .animate-spin-slow {
          animation: spin 12s linear infinite;
        }
        .animate-glitch {
          animation: glitch 1s linear infinite;
        }
        @keyframes glitch {
          0% { transform: translate(0); }
          20% { transform: translate(-2px, 2px); }
          40% { transform: translate(-2px, -2px); }
          60% { transform: translate(2px, 2px); }
          80% { transform: translate(2px, -2px); }
          100% { transform: translate(0); }
        }
        .clip-path-hex {
          clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%);
        }
        .clip-path-slant {
          clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
        }
        .neon-text-cyan {
          text-shadow: 0 0 10px rgba(0, 243, 255, 0.5), 0 0 20px rgba(0, 243, 255, 0.3);
        }
        .neon-text-orange {
          text-shadow: 0 0 10px rgba(242, 105, 13, 0.5), 0 0 20px rgba(242, 105, 13, 0.3);
        }
        .text-stroke-white {
          -webkit-text-stroke: 1px white;
        }
        .text-stroke-cyan {
          -webkit-text-stroke: 1px #00f3ff;
        }
        .perspective-1000 {
          perspective: 1000px;
        }
        .preserve-3d {
          transform-style: preserve-3d;
        }
        .animate-spin-3d {
          animation: spin3d 10s linear infinite;
        }
        @keyframes spin3d {
          0% { transform: rotateY(0); }
          100% { transform: rotateY(360deg); }
        }
        .translate-z-10 {
          transform: translateZ(10px);
        }
      }
      body {
        font-family: 'Manrope', sans-serif;
        background-color: #0a0805;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0805;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #f29e0d;
      }
    </style>

</script>
